name: Generate RSS Feed

on:
  schedule:
    - cron: '0 13 * * 1'  # Lunes 8am Colombia (UTC-5 = 13:00 UTC)
  push:
    branches:
      - main

jobs:
  build-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate feed.xml
        run: |
          python - <<'EOF'
          import json
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          from email.utils import format_datetime
          import re

          SITE_URL = "https://geiperud.github.io/geiper2026"
          FEED_URL = f"{SITE_URL}/feed.xml"

          def to_rfc2822(date_str):
              """Convert YYYY-MM-DD to RFC 2822 format required by RSS 2.0."""
              dt = datetime.strptime(date_str, "%Y-%m-%d").replace(tzinfo=timezone.utc)
              return format_datetime(dt)

          def safe_url(url):
              if re.match(r'^https?://', url):
                  return url
              return SITE_URL

          with open("data/eventos_feed.json", encoding="utf-8") as f:
              events = json.load(f)

          rss = ET.Element("rss", version="2.0", attrib={
              "xmlns:atom": "http://www.w3.org/2005/Atom"
          })
          channel = ET.SubElement(rss, "channel")

          ET.SubElement(channel, "title").text = "GEIPER – Eventos y Convocatorias"
          ET.SubElement(channel, "link").text = SITE_URL
          ET.SubElement(channel, "description").text = (
              "Feed RSS del semillero de investigación GEIPER – "
              "eventos, convocatorias y talleres."
          )
          ET.SubElement(channel, "language").text = "es-co"
          ET.SubElement(channel, "lastBuildDate").text = format_datetime(
              datetime.now(timezone.utc)
          )
          atom_link = ET.SubElement(channel, "atom:link")
          atom_link.set("href", FEED_URL)
          atom_link.set("rel", "self")
          atom_link.set("type", "application/rss+xml")

          for event in events:
              item = ET.SubElement(channel, "item")
              ET.SubElement(item, "title").text = event["title"]
              ET.SubElement(item, "link").text = safe_url(event["link"])
              ET.SubElement(item, "description").text = (
                  f"[{event['type']}] {event['description']} "
                  f"Etiquetas: {', '.join(event.get('tags', []))}"
              )
              ET.SubElement(item, "pubDate").text = to_rfc2822(event["date"])
              ET.SubElement(item, "guid", isPermaLink="false").text = (
                  f"{SITE_URL}#evento-{event['id']}"
              )
              ET.SubElement(item, "category").text = event["type"]

          tree = ET.ElementTree(rss)
          ET.indent(tree, space="  ")
          with open("feed.xml", "wb") as f:
              f.write(b'<?xml version="1.0" encoding="UTF-8"?>\n')
              tree.write(f, encoding="utf-8", xml_declaration=False)

          print("feed.xml generado correctamente.")
          EOF

      - name: Commit and push feed.xml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          if git diff --cached --quiet; then
            echo "Sin cambios en feed.xml, nada que commitear."
          else
            git commit -m "chore: update feed.xml [skip ci]"
            git push
          fi
