/* ══════════════════════════════════════════════
   GEOVISOR — Estilos exclusivos (no modifica styles.css)
   ══════════════════════════════════════════════ */

/* Reset de página completa para modo app */
html, body {
  height: 100%;
  overflow: hidden;
}

/* ── Wrapper principal ───────────────────────── */
.geo-wrapper {
  display: flex;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  padding-top: 66px; /* altura real del navbar (15px*2 padding + 36px logo) */
  overflow: hidden;
  font-family: 'Montserrat', sans-serif;
}

/* ════════════════════════════════════════════
   SIDEBAR IZQUIERDA
   ════════════════════════════════════════════ */
.geo-sidebar {
  width: 300px;
  min-width: 300px;
  background: #ffffff;
  border-right: 1px solid #e2e8f0;
  box-shadow: 2px 0 8px rgba(0,0,0,0.05);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 5;
}

/* Encabezado sidebar */
.geo-sidebar-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}

.geo-sidebar-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  color: #94a3b8;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}

/* Buscador */
.geo-search-wrap {
  position: relative;
  margin-bottom: 10px;
}

.geo-search-wrap i {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: #94a3b8;
  font-size: 12px;
  pointer-events: none;
}

#searchInput {
  width: 100%;
  padding: 8px 10px 8px 30px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  font-size: 12px;
  font-family: 'Montserrat', sans-serif;
  color: #334155;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#searchInput:focus {
  border-color: #1D9E75;
  box-shadow: 0 0 0 3px rgba(29,158,117,0.1);
}

/* Chips de filtro */
.geo-chips {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.geo-chip {
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 500;
  font-family: 'Montserrat', sans-serif;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 20px;
  color: #64748b;
  cursor: pointer;
  transition: all 0.15s;
}

.geo-chip:hover {
  border-color: #1D9E75;
  color: #0F6E56;
}

.geo-chip.active {
  background: #1D9E75;
  border-color: #1D9E75;
  color: #ffffff;
}

/* Lista de proyectos */
.geo-proj-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.geo-proj-list::-webkit-scrollbar { width: 4px; }
.geo-proj-list::-webkit-scrollbar-track { background: transparent; }
.geo-proj-list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }

/* Tarjeta de proyecto */
.geo-proj-card {
  padding: 10px 12px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-left: 3px solid transparent;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
}

.geo-proj-card:hover {
  background: #f0fdf4;
  border-color: #bbf7d0;
  border-left-color: #1D9E75;
}

.geo-proj-card.active {
  background: #f0fdf4;
  border-color: #86efac;
  border-left-color: #1D9E75;
}

.geo-proj-name {
  font-size: 12px;
  font-weight: 600;
  color: #1e293b;
  line-height: 1.4;
  margin-bottom: 6px;
}

.geo-proj-meta {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
}

.geo-badge-cat {
  font-size: 9px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.geo-badge-cat.pr  { background: #dcfce7; color: #166534; }
.geo-badge-cat.sig { background: #dbeafe; color: #1e40af; }
.geo-badge-cat.cat { background: #fef9c3; color: #854d0e; }

.geo-proj-year {
  font-size: 10px;
  color: #94a3b8;
}

/* Pie de sidebar */
.geo-sidebar-footer {
  padding: 10px 16px;
  background: #f8fafc;
  border-top: 1px solid #e2e8f0;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: #94a3b8;
}

/* ════════════════════════════════════════════
   ÁREA DEL MAPA
   ════════════════════════════════════════════ */
.geo-map-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  min-height: 0;
  min-width: 0;
}

#mapCanvas {
  position: relative;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

#map {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #f9fafb;
}

/* Ocultar controles nativos de OL */
.ol-zoom,
.ol-attribution { display: none !important; }

/* ScaleLine */
.ol-scale-line {
  background: rgba(255,255,255,0.85) !important;
  border: 1px solid #e2e8f0 !important;
  border-radius: 6px !important;
  padding: 4px 8px !important;
  bottom: 30px !important;
  left: 50% !important;
  transform: translateX(-50%) !important;
  font-size: 10px !important;
  color: #475569 !important;
  font-family: 'Montserrat', sans-serif !important;
}

.ol-scale-line-inner {
  border: 1.5px solid #94a3b8 !important;
  border-top: none !important;
  color: #475569 !important;
  font-size: 10px !important;
  font-family: 'Montserrat', sans-serif !important;
}

/* ── Badge de proyecto activo ─────────────── */
.geo-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 10;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(10px);
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  padding: 10px 14px;
  pointer-events: none;
  transition: opacity 0.2s;
  min-width: 180px;
  max-width: 280px;
}

.geo-badge.hidden { opacity: 0; }

.geo-badge-title {
  font-size: 13px;
  font-weight: 700;
  color: #0F6E56;
  line-height: 1.3;
  margin-bottom: 4px;
}

.geo-badge-sub {
  font-size: 10px;
  color: #64748b;
  line-height: 1.4;
}

/* ── Controles de zoom ────────────────────── */
.geo-controls {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.geo-controls .sep {
  height: 4px;
}

.geo-btn {
  width: 34px;
  height: 34px;
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #64748b;
  font-size: 13px;
  transition: all 0.15s;
}

.geo-btn:hover {
  background: #f0fdf4;
  color: #0F6E56;
  border-color: #86efac;
  transform: scale(1.05);
}

/* ── Coordenadas ──────────────────────────── */
.geo-coords {
  position: absolute;
  bottom: 8px;
  right: 8px;
  z-index: 10;
  background: rgba(255,255,255,0.92);
  border: 1px solid #e2e8f0;
  border-radius: 4px;
  padding: 3px 8px;
  font-family: monospace;
  font-size: 10px;
  color: #475569;
  pointer-events: none;
}

/* ── Popup de atributos ───────────────────── */
.geo-popup-container {
  position: absolute;
  z-index: 20;
  display: none;
  transform: translate(-50%, calc(-100% - 14px));
  pointer-events: auto;
}

.geo-popup {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.15);
  min-width: 200px;
  max-width: 280px;
  overflow: hidden;
}

.geo-popup::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 16px;
  height: 8px;
  background: #ffffff;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  border-left: 1px solid #e2e8f0;
  border-right: 1px solid #e2e8f0;
}

.geo-popup-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px 8px;
  border-bottom: 1px solid #f1f5f9;
}

.geo-popup-title {
  font-size: 12px;
  font-weight: 700;
  color: #0F6E56;
}

#popupClose {
  width: 20px;
  height: 20px;
  background: none;
  border: none;
  color: #94a3b8;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  transition: all 0.15s;
}

#popupClose:hover { background: #f1f5f9; color: #475569; }

.geo-popup-body {
  padding: 8px 12px 10px;
  overflow-y: auto;
  max-height: 200px;
}

.geo-popup-table {
  width: 100%;
  border-collapse: collapse;
}

.geo-popup-table tr + tr td {
  border-top: 1px solid #f8fafc;
}

.geo-popup-table td {
  padding: 3px 4px;
  vertical-align: top;
}

.geo-popup-table td:first-child {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  color: #94a3b8;
  letter-spacing: 0.5px;
  white-space: nowrap;
  padding-right: 8px;
  width: 40%;
}

.geo-popup-table td:last-child {
  font-size: 11px;
  color: #334155;
}

/* ════════════════════════════════════════════
   PANEL INFERIOR
   ════════════════════════════════════════════ */
#bottomPanel {
  height: 160px;
  flex-shrink: 0;
  background: #ffffff;
  border-top: 1px solid #e2e8f0;
  display: flex;
  flex-direction: column;
  transition: height 0.3s ease;
}

#bottomPanel.collapsed {
  height: 42px;
  overflow: hidden;
}

.bp-topbar {
  height: 42px;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
  background: #ffffff;
  cursor: pointer;
}

.bp-handle {
  width: 30px;
  height: 3px;
  background: #cbd5e1;
  border-radius: 2px;
  flex-shrink: 0;
}

.bp-proj-name {
  font-size: 12px;
  font-weight: 600;
  color: #0F6E56;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 220px;
}

.bp-tabs {
  display: flex;
  gap: 2px;
}

.bp-tab {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: #64748b;
  cursor: pointer;
  font-family: 'Montserrat', sans-serif;
  transition: all 0.15s;
}

.bp-tab:hover { background: #f1f5f9; color: #334155; }

.bp-tab.active {
  background: #E1F5EE;
  color: #0F6E56;
  font-weight: 600;
}

.bp-close {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  border: 1px solid #e2e8f0;
  background: #f8fafc;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #64748b;
  font-size: 12px;
  transition: all 0.2s;
  flex-shrink: 0;
}

.bp-close:hover { background: #f0fdf4; color: #0F6E56; border-color: #86efac; }

#bottomPanel.collapsed .bp-close i { transform: rotate(180deg); }

.bp-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px 16px;
  display: flex;
  gap: 24px;
  align-items: flex-start;
}

.bp-body::-webkit-scrollbar { width: 3px; }
.bp-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

.bp-tab-content {
  display: flex;
  flex-direction: row;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
  width: 100%;
}

#bpLayerList {
  display: flex;
  flex-direction: row;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  flex: 1;
}

.bp-layer-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.bp-layer-row:hover { border-color: #1D9E75; }
.bp-layer-row.selected { background: #f0fdf4; border-color: #86efac; }
.bp-layer-row.selected .bp-layer-name { color: #0F6E56; font-weight: 600; }

.bp-layer-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.bp-layer-name { font-size: 11px; color: #475569; }

.bp-toggle {
  position: relative;
  width: 26px;
  height: 14px;
  flex-shrink: 0;
}

.bp-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

.bp-toggle-slider {
  position: absolute;
  inset: 0;
  background: #e2e8f0;
  border-radius: 20px;
  transition: 0.2s;
  cursor: pointer;
}

.bp-toggle-slider::before {
  content: '';
  position: absolute;
  width: 10px; height: 10px;
  left: 2px; top: 2px;
  background: white;
  border-radius: 50%;
  transition: 0.2s;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

.bp-toggle input:checked + .bp-toggle-slider { background: #1D9E75; }
.bp-toggle input:checked + .bp-toggle-slider::before { transform: translateX(12px); }

.bp-opacity-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 20px;
}

.bp-opacity-label { font-size: 10px; color: #94a3b8; white-space: nowrap; }
.bp-slider { width: 80px; accent-color: #1D9E75; cursor: pointer; }
.bp-opacity-val { font-size: 10px; color: #1D9E75; font-weight: 600; min-width: 28px; }

.bp-meta-table {
  width: 100%;
  border-collapse: collapse;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 0 12px;
}

.bp-meta-table tr { display: contents; }

.bp-meta-table td { padding: 2px 0; font-size: 10px; vertical-align: top; }

.bp-meta-table td:first-child {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #94a3b8;
  font-weight: 700;
  display: block;
  margin-bottom: 1px;
}

.bp-meta-table td:last-child { color: #334155; font-weight: 500; display: block; }

#bpDownloadList {
  display: flex;
  flex-direction: row;
  gap: 8px;
  flex-wrap: wrap;
  flex: 1;
  align-items: center;
}

.bp-dl-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 20px;
}

.bp-dl-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.bp-dl-name { font-size: 10px; color: #64748b; font-weight: 500; }

.bp-dl-select {
  font-size: 10px;
  background: transparent;
  border: none;
  color: #1D9E75;
  font-weight: 600;
  cursor: pointer;
  outline: none;
  font-family: 'Montserrat', sans-serif;
}

.bp-dl-all {
  padding: 6px 14px;
  background: #1D9E75;
  color: white;
  border: none;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Montserrat', sans-serif;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}

.bp-dl-all:hover { background: #0F6E56; }

.bp-bm-option {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 20px;
  cursor: pointer;
  font-size: 11px;
  color: #475569;
}

.bp-bm-option input[type="radio"] { accent-color: #1D9E75; cursor: pointer; }

.bp-bm-thumb { width: 22px; height: 14px; border-radius: 3px; border: 1px solid #e2e8f0; flex-shrink: 0; }
.bp-bm-thumb.osm   { background: linear-gradient(135deg, #ddf2d0, #b3d4f5); }
.bp-bm-thumb.sat   { background: linear-gradient(135deg, #2d4a1e, #1a2d0e); }
.bp-bm-thumb.blank { background: #f9fafb; }

/* ════════════════════════════════════════════
   TOAST
   ════════════════════════════════════════════ */
#geoToast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: #0F6E56;
  color: #ffffff;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 12px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 9999;
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
}

#geoToast i { color: #86efac; }

#geoToast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ════════════════════════════════════════════
   SCROLLBAR GLOBAL (panel y sidebar)
   ════════════════════════════════════════════ */
.geo-proj-list::-webkit-scrollbar {
  width: 4px;
}
</style>

<!-- ══════════════════════════════════════════
     WRAPPER PRINCIPAL (tres columnas)

<div class="geo-wrapper">

  <!-- ── COLUMNA 1: Sidebar de proyectos ───── -->
  <aside class="geo-sidebar">
    <div class="geo-sidebar-header">
      <div class="geo-sidebar-label">
        <i class="fa-solid fa-map"></i>
        PROYECTOS
      </div>
      <!-- Buscador -->
      <div class="geo-search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Buscar proyecto...">
      </div>
      <!-- Chips de filtro -->

/* ══════════════════════════════════════════════
   ESTADO GLOBAL
   ══════════════════════════════════════════════ */
let activeProject  = null;
let activeLayerId  = null;
let currentFilter  = 'todos';
let vectorLayer    = null;
let map, osmLayer, satLayer, view;
let toastTimer     = null;

/* ══════════════════════════════════════════════
   INIT MAP
   ══════════════════════════════════════════════ */
function initMap() {
  osmLayer = new ol.layer.Tile({ source: new ol.source.OSM() });

  satLayer = new ol.layer.Tile({
    source: new ol.source.XYZ({
      url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      attributions: 'Tiles &copy; Esri'
    }),
    visible: false
  });

  view = new ol.View({
    center: ol.proj.fromLonLat([-74.0721, 4.7110]),
    zoom: 11,
    minZoom: 4,
    maxZoom: 19
  });

  map = new ol.Map({
    target: 'map',
    layers: [osmLayer, satLayer],
    view: view,
    controls: []
  });
  map.addControl(new ol.control.ScaleLine({ units: 'metric' }));

  /* Coordenadas del cursor */
  map.on('pointermove', function (evt) {
    const coord = ol.proj.toLonLat(evt.coordinate);
    const lon   = Math.abs(coord[0]).toFixed(4);
    const lat   = Math.abs(coord[1]).toFixed(4);
    const lonDir = coord[0] >= 0 ? 'E' : 'W';
    const latDir = coord[1] >= 0 ? 'N' : 'S';
    document.getElementById('geoCoords').textContent =
      lat + '\u00b0 ' + latDir + '\u00a0\u00a0\u00a0' + lon + '\u00b0 ' + lonDir;
  });

  /* Click en feature → popup */
  map.on('singleclick', function (evt) {
    const popup = document.getElementById('geoPopup');
    let found   = false;

    map.forEachFeatureAtPixel(evt.pixel, function (feature) {
      if (found) return;
      found = true;

      const props = feature.getProperties();
      const geom  = feature.getGeometry();
      let pixel;

      if (geom.getType() === 'Point') {
        pixel = map.getPixelFromCoordinate(geom.getCoordinates());
      } else if (geom.getType() === 'LineString') {
        const coords = geom.getCoordinates();
        const mid    = coords[Math.floor(coords.length / 2)];
        pixel = map.getPixelFromCoordinate(mid);
      } else {
        const ext = geom.getExtent();
        const ctr = ol.extent.getCenter(ext);
        pixel = map.getPixelFromCoordinate(ctr);
      }

      /* Título del popup */
      const layerName = activeProject
        ? (activeProject.capas.find(c => c.id === props['__layer']) || { nombre: 'Feature' }).nombre
        : 'Atributos';
      document.getElementById('popupTitle').textContent = layerName;

      /* Tabla de atributos */
      const table = document.getElementById('popupTable');
      table.innerHTML = '';
      Object.entries(props).forEach(function ([k, v]) {
        if (k === '__layer' || k === 'geometry') return;
        const row = document.createElement('tr');
        row.innerHTML = '<td>' + escHtml(k) + '</td><td>' + escHtml(String(v)) + '</td>';
        table.appendChild(row);
      });

      /* Posicionar popup */
      popup.style.left = pixel[0] + 'px';
      popup.style.top  = pixel[1] + 'px';
      popup.style.display = 'block';
    }, { hitTolerance: 8 });

    if (!found) {
      document.getElementById('geoPopup').style.display = 'none';
    }
  });

  /* Cerrar popup */
  document.getElementById('popupClose').addEventListener('click', function () {
    document.getElementById('geoPopup').style.display = 'none';
  });
}

/* Escapar HTML para evitar XSS */
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════════════
   CARGAR PROYECTO
   ══════════════════════════════════════════════ */
function loadProject(proj) {
  activeProject = proj;
  activeLayerId = proj.capas.length ? proj.capas[0].id : null;

  /* Ocultar popup */
  document.getElementById('geoPopup').style.display = 'none';

  /* Badge */
  const badge = document.getElementById('geoBadge');
  badge.classList.remove('hidden');
  document.getElementById('badgeTitle').textContent = proj.nombre;
  document.getElementById('badgeSub').textContent =
    proj.catLabel + ' · ' + proj.sensor + ' · ' + proj.año;

  /* Renderizar features */
  renderProjectFeatures(proj);

  /* Encuadrar */
  const ext3857 = ol.proj.transformExtent(proj.extent, 'EPSG:4326', 'EPSG:3857');
  view.fit(ext3857, { padding: [50, 50, 50, 50], duration: 700 });

  /* Panel derecho */
  renderPanel(proj);

  /* Marcar tarjeta activa */
  document.querySelectorAll('.geo-proj-card').forEach(function (el) {
    el.classList.toggle('active', parseInt(el.dataset.id) === proj.id);
  });
}

/* ══════════════════════════════════════════════
   RENDERIZAR FEATURES EN EL MAPA
   ══════════════════════════════════════════════ */
function renderProjectFeatures(proj) {
  if (vectorLayer) {
    map.removeLayer(vectorLayer);
    vectorLayer = null;
  }

  const gjFormat = new ol.format.GeoJSON({
    dataProjection:    'EPSG:4326',
    featureProjection: 'EPSG:3857'
  });

  const features = [];
  proj.features.forEach(function (f) {
    const capa = proj.capas.find(c => c.id === f.layer);
    if (!capa || !capa.visible) return;

    const olFeature = gjFormat.readFeature(f);
    olFeature.set('__layer', f.layer);
    olFeature.setStyle(buildStyle(f.geometry.type, capa.color));
    features.push(olFeature);
  });

  const source = new ol.source.Vector({ features: features });
  vectorLayer  = new ol.layer.Vector({ source: source });
  map.addLayer(vectorLayer);
}

/* ── Estilos por tipo de geometría ─────────── */
function buildStyle(type, color) {
  if (type === 'Point') {
    return new ol.style.Style({
      image: new ol.style.Circle({
        radius: 7,
        fill:   new ol.style.Fill({ color: color }),
        stroke: new ol.style.Stroke({ color: '#ffffff', width: 2 })
      })
    });
  } else if (type === 'LineString') {
    return new ol.style.Style({
      stroke: new ol.style.Stroke({ color: color, width: 2.5 })
    });
  } else {
    /* Polygon */
    return new ol.style.Style({
      fill:   new ol.style.Fill({ color: color + '55' }),
      stroke: new ol.style.Stroke({ color: color, width: 1.5 })
    });
  }
}

/* ── Refrescar capas según visibilidad ─────── */
function refreshLayers() {
  if (!activeProject || !vectorLayer) return;
  const src = vectorLayer.getSource();
  src.clear();

  const gjFormat = new ol.format.GeoJSON({
    dataProjection:    'EPSG:4326',
    featureProjection: 'EPSG:3857'
  });

  activeProject.features.forEach(function (f) {
    const capa = activeProject.capas.find(c => c.id === f.layer);
    if (!capa || !capa.visible) return;
    const olFeature = gjFormat.readFeature(f);
    olFeature.set('__layer', f.layer);
    olFeature.setStyle(buildStyle(f.geometry.type, capa.color));
    src.addFeature(olFeature);
  });
}

/* ══════════════════════════════════════════════
   RENDERIZAR PANEL DERECHO
   ══════════════════════════════════════════════ */
function renderPanel(proj) {
  const bp = document.getElementById('bottomPanel');
  bp.style.display = 'flex';
  bp.classList.remove('collapsed');

  document.getElementById('bpProjName').textContent = proj.nombre;

  /* ── TAB CAPAS ── */
  const ll = document.getElementById('bpLayerList');
  ll.innerHTML = '';
  proj.capas.forEach(function (capa) {
    const row = document.createElement('div');
    row.className = 'bp-layer-row' + (capa.id === activeLayerId ? ' selected' : '');
    row.innerHTML =
      '<div class="bp-layer-dot" style="background:' + capa.color + '"></div>' +
      '<span class="bp-layer-name">' + escHtml(capa.nombre) + '</span>' +
      '<label class="bp-toggle">' +
        '<input type="checkbox"' + (capa.visible ? ' checked' : '') + '>' +
        '<span class="bp-toggle-slider"></span>' +
      '</label>';
    row.addEventListener('click', function (e) {
      if (e.target.tagName === 'INPUT') return;
      activeLayerId = capa.id;
      renderPanel(activeProject);
      refreshLayers();
    });
    row.querySelector('input').addEventListener('change', function (e) {
      e.stopPropagation();
      capa.visible = e.target.checked;
      refreshLayers();
    });
    ll.appendChild(row);
  });

  const slider = document.getElementById('bpOpacitySlider');
  slider.value = vectorLayer ? Math.round(vectorLayer.getOpacity() * 100) : 100;
  document.getElementById('bpOpacityVal').textContent = slider.value + '%';

  /* ── TAB METADATOS ── */
  document.getElementById('bpMetaTable').innerHTML =
    '<tr><td>Autor</td><td>' + escHtml(proj.autor) + '</td></tr>' +
    '<tr><td>Año</td><td>' + proj.año + '</td></tr>' +
    '<tr><td>Sensor</td><td>' + escHtml(proj.sensor) + '</td></tr>' +
    '<tr><td>Escala</td><td>' + escHtml(proj.escala) + '</td></tr>' +
    '<tr><td>CRS</td><td>' + escHtml(proj.crs) + '</td></tr>' +
    '<tr><td>Categoría</td><td>' + escHtml(proj.catLabel) + '</td></tr>';

  /* ── TAB DESCARGAS ── */
  const dl = document.getElementById('bpDownloadList');
  dl.innerHTML = '';
  proj.capas.forEach(function (capa) {
    const item = document.createElement('div');
    item.className = 'bp-dl-item';
    item.innerHTML =
      '<div class="bp-dl-dot" style="background:' + capa.color + '"></div>' +
      '<span class="bp-dl-name">' + escHtml(capa.nombre) + '</span>' +
      '<select class="bp-dl-select">' +
        '<option value="">↓ Formato</option>' +
        '<option value="geojson">GeoJSON</option>' +
        '<option value="shp">SHP (ZIP)</option>' +
        '<option value="kml">KML</option>' +
        '<option value="csv">CSV</option>' +
      '</select>';
    item.querySelector('select').addEventListener('change', function () {
      if (!this.value) return;
      showToast('Descargando ' + capa.nombre + ' como ' + this.value.toUpperCase());
      var s = this;
      setTimeout(function () { s.value = ''; }, 1200);
    });
    dl.appendChild(item);
  });
}

/* ══════════════════════════════════════════════
   LISTA DE PROYECTOS (sidebar)
   ══════════════════════════════════════════════ */
function renderProjectList() {
  const query  = document.getElementById('searchInput').value.toLowerCase().trim();
  const list   = document.getElementById('projectList');
  list.innerHTML = '';

  const filtered = PROJECTS.filter(function (p) {
    const matchCat  = currentFilter === 'todos' || p.cat === currentFilter;
    const matchText = !query ||
      p.nombre.toLowerCase().includes(query) ||
      p.catLabel.toLowerCase().includes(query) ||
      String(p.año).includes(query) ||
      p.sensor.toLowerCase().includes(query);
    return matchCat && matchText;
  });

  filtered.forEach(function (proj) {
    const card = document.createElement('div');
    card.className = 'geo-proj-card' + (activeProject && activeProject.id === proj.id ? ' active' : '');
    card.dataset.id = proj.id;

    const badgeClass = proj.cat;
    card.innerHTML =
      '<div class="geo-proj-name">' + escHtml(proj.nombre) + '</div>' +
      '<div class="geo-proj-meta">' +
        '<span class="geo-badge-cat ' + badgeClass + '">' + escHtml(proj.catLabel) + '</span>' +
        '<span class="geo-proj-year">' + proj.año + '</span>' +
      '</div>';

    card.addEventListener('click', function () { loadProject(proj); });
    list.appendChild(card);
  });

  /* Contador en footer */
  const cats = new Set(filtered.map(p => p.cat));
  document.getElementById('footerCount').textContent =
    filtered.length + ' proyecto' + (filtered.length !== 1 ? 's' : '') +
    ' · ' + cats.size + ' categoría' + (cats.size !== 1 ? 's' : '');
}

/* ══════════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════════ */
function showToast(msg) {
  const toast = document.getElementById('geoToast');
  document.getElementById('toastMsg').textContent = msg;
  clearTimeout(toastTimer);
  toast.classList.add('show');
  toastTimer = setTimeout(function () {
    toast.classList.remove('show');
  }, 3000);
}

/* ══════════════════════════════════════════════
   INICIALIZAR UI
   ══════════════════════════════════════════════ */
function initUI() {
  /* Chips de filtro */
  document.querySelectorAll('.geo-chip').forEach(function (chip) {
    chip.addEventListener('click', function () {
      document.querySelectorAll('.geo-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentFilter = chip.dataset.filter;
      renderProjectList();
    });
  });

  /* Buscador */
  document.getElementById('searchInput').addEventListener('keyup', renderProjectList);

  /* Zoom in / out */
  document.getElementById('btnZoomIn').addEventListener('click', function () {
    view.animate({ zoom: view.getZoom() + 1, duration: 250 });
  });
  document.getElementById('btnZoomOut').addEventListener('click', function () {
    view.animate({ zoom: view.getZoom() - 1, duration: 250 });
  });

  /* Volver a Bogotá */
  document.getElementById('btnColombia').addEventListener('click', function () {
    view.animate({ center: ol.proj.fromLonLat([-74.0721, 4.7110]), zoom: 11, duration: 600 });

    /* Limpiar proyecto activo */
    activeProject = null;
    activeLayerId = null;
    if (vectorLayer) { map.removeLayer(vectorLayer); vectorLayer = null; }
    document.getElementById('geoBadge').classList.add('hidden');
    document.getElementById('geoPopup').style.display = 'none';
    document.getElementById('bottomPanel').style.display = 'none';
    document.querySelectorAll('.geo-proj-card').forEach(function (c) { c.classList.remove('active'); });
    map.updateSize();
  });

  /* Pantalla completa */
  document.getElementById('btnFullscreen').addEventListener('click', function () {
    const container = document.querySelector('.geo-map-container');
    const fsIcon    = document.getElementById('fsIcon');
    if (!document.fullscreenElement) {
      container.requestFullscreen && container.requestFullscreen();
      fsIcon.classList.replace('fa-expand', 'fa-compress');
    } else {
      document.exitFullscreen && document.exitFullscreen();
      fsIcon.classList.replace('fa-compress', 'fa-expand');
    }
  });

  document.addEventListener('fullscreenchange', function () {
    if (!document.fullscreenElement) {
      document.getElementById('fsIcon').classList.replace('fa-compress', 'fa-expand');
    }
  });

  /* ── Pestañas del panel inferior ── */
  document.querySelectorAll('.bp-tab').forEach(function (tab) {
    tab.addEventListener('click', function (e) {
      e.stopPropagation();
      document.querySelectorAll('.bp-tab').forEach(function (t) { t.classList.remove('active'); });
      document.querySelectorAll('.bp-tab-content').forEach(function (c) { c.style.display = 'none'; });
      this.classList.add('active');
      document.getElementById('tab-' + this.dataset.tab).style.display = 'flex';
    });
  });

  /* ── Colapsar/expandir topbar ── */
  document.querySelector('#bottomPanel .bp-topbar').addEventListener('click', function (e) {
    if (e.target.closest('.bp-tab') || e.target.closest('.bp-close')) return;
    document.getElementById('bottomPanel').classList.toggle('collapsed');
    map.updateSize();
  });

  /* ── Botón colapsar panel ── */
  document.getElementById('bpClose').addEventListener('click', function (e) {
    e.stopPropagation();
    document.getElementById('bottomPanel').classList.toggle('collapsed');
    map.updateSize();
  });

  /* ── Slider de opacidad del panel inferior ── */
  document.getElementById('bpOpacitySlider').addEventListener('input', function () {
    document.getElementById('bpOpacityVal').textContent = this.value + '%';
    if (vectorLayer) vectorLayer.setOpacity(this.value / 100);
  });

  /* ── Botón descarga completa ── */
  document.getElementById('bpBtnDlAll').addEventListener('click', function () {
    if (!activeProject) return;
    showToast('Preparando ZIP: ' + activeProject.nombre.substring(0, 28) + '...');
  });

  /* ── Selector de mapa base ── */
  document.querySelectorAll('input[name="basemap"]').forEach(function (radio) {
    radio.addEventListener('change', function () {
      osmLayer.setVisible(this.value === 'osm');
      satLayer.setVisible(this.value === 'sat');
      document.getElementById('map').style.background = this.value === 'blank' ? '#f9fafb' : '';
    });
  });

  /* Hamburger menu del navbar */
  (function () {
    const header = document.querySelector('header');
    const btn    = document.getElementById('navHamburger');
    const links  = document.getElementById('navLinks');
    if (!btn || !links) return;

    function checkFit() {
      header.classList.remove('mobile-nav');
      links.classList.remove('open');
      btn.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');

      links.style.cssText = 'display:flex;flex-direction:row;position:static;width:auto;visibility:hidden;';
      btn.style.display   = 'none';

      const navEl   = document.querySelector('nav');
      const brandEl = navEl.querySelector('.nav-brand');
      const gap     = 40;
      const fits    = brandEl.offsetWidth + gap + links.scrollWidth <= navEl.offsetWidth;

      links.style.cssText = '';
      btn.style.display   = '';

      if (!fits) header.classList.add('mobile-nav');
    }

    btn.addEventListener('click', function () {
      const isOpen = links.classList.toggle('open');
      btn.classList.toggle('open', isOpen);
      btn.setAttribute('aria-expanded', isOpen);
    });

    links.querySelectorAll('a').forEach(function (a) {
      a.addEventListener('click', function () {
        links.classList.remove('open');
        btn.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      });
    });

    document.addEventListener('click', function (e) {
      if (!btn.contains(e.target) && !links.contains(e.target)) {
        links.classList.remove('open');
        btn.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });

    checkFit();
    window.addEventListener('resize', checkFit);
  })();
}

/* ══════════════════════════════════════════════
   ARRANQUE (window.load para dimensiones reales)
   ══════════════════════════════════════════════ */
window.addEventListener('load', function () {
  initMap();
  initUI();
  renderProjectList();
  /* Forzar recálculo de dimensiones tras render completo del flex layout */
  setTimeout(function () { map.updateSize(); }, 100);
  window.addEventListener('resize', function () { map.updateSize(); });
});
</script>
</body>
</html>
